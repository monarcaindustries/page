<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monarca Page</title>
  <style>
    body {
      background-image: url('resources|/images/mon.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    .links {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .links a {
      text-decoration: none;
      color: white;
      margin-right: 15px;
      font-weight: bold;
      font-size: 18px;
      padding: 5px 10px;
      background: rgba(0,0,0,0.4); /* Fondo semi-transparente para mejor legibilidad */
      border-radius: 5px;
    }

    .links a:hover {
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
  <div class="links">
    <a href="https://github.com/tu-usuario/tu-repo" target="_blank">GitHub</a>
    <a href="https://tu-usuario.github.io/page/" target="_blank">Page</a>
  </div>
</body>
</html>
